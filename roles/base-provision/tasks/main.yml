---
- name: Stop package manager processes if they exist (using a CTRL-c equivalent SIGINT)
  shell: |
    pids=$(pidof -x /usr/bin/dnf /usr/bin/yum /usr/bin/dnf-3 /bin/dnf /bin/yum /bin/dnf-3)
    if [ -n "$pids" ]; then
      echo "Killing processes with PIDs: $pids"
      kill -INT $pids
    else
      echo "No running package manager processes found."
    fi
  register: package_managed_proc_kill
  when: install_os_packages
  changed_when: package_managed_proc_kill.stdout != 'No running package manager processes found.'
  tags: os_packages

- name: Remove ntpd package
  package:
    name: ntp
    state: absent
    lock_timeout: "{{ pkg_mgr_lock_timeout }}"
  when: cluster_name is defined
  tags: ntp

- name: Remove ntp conf
  file:
    path: /etc/ntp.conf
    state: absent
  when: cluster_name is defined
  tags: ntp

- name: Gather installed packages
  ansible.builtin.package_facts:
  tags: os_packages

- name: Disable avahi daemon
  systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  when:
    - cluster_name is defined
    - "'avahi' in ansible_facts.packages"
  ignore_errors: yes
  with_items:
    - avahi-daemon.socket
    - avahi-daemon.service
  tags: cvu

- name: Set up Artifact Registry mirrors if enabled
  include_tasks:
    file: ar_repo_setup.yml
  when:
    - install_os_packages
    - ar_repo_url is defined and ar_repo_url | length > 0
  tags: os-packages

- name: Install required base OS packages
  package:
    name: "{{ required_packages }}"
    state: present
    lock_timeout: "{{ pkg_mgr_lock_timeout }}"
  when: install_os_packages
  tags: os_packages

- name: Add ntp preferred server
  blockinfile:
    path: /etc/chrony.conf
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    insertafter: "^server "
    block: "server {{ ntp_preferred }} prefer iburst"
    state: "{{ (ntp_preferred != \"\") | ternary('present', 'absent') }}"
  notify: restart chronyd
  tags: ntp

- name: Make sure chronyd is running
  service:
    name: chronyd
    state: started
    enabled: true
  tags: ntp

- name: Generate /etc/hosts
  blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    block: |
      {% for host in groups['all'] %}
      {% if cluster_domain is defined %}
      {{ hostvars[host]['ansible_ssh_host'] }}    {{ host }}.{{ cluster_domain }}  {{ host }}
      {% else %}
      {{ hostvars[host]['ansible_ssh_host'] }}    {{ host }}
      {% endif %}
      {% endfor %}
      {% for host in groups['all'] %}
      {% if hostvars[host]['vip_ip'] is defined %}
      {% if cluster_domain is defined %}
      {{ hostvars[host]['vip_ip'] }}    {{ hostvars[host]['vip_name'] }}.{{ cluster_domain }}  {{ vip_name }}
      {% else %}
      {{ hostvars[host]['vip_ip'] }}    {{ hostvars[host]['vip_name'] }}
      {% endif %}
      {% endif %}
      {% endfor %}
      {% for host in groups['all'] %}
      {% if loop.first %}
      {% if scan_name is defined %}
      {% for h in hostvars[host] %}
      {% if 'scan_ip' in h %}
      {% if cluster_domain is defined %}
      {{ hostvars[host][h] }}    {{ scan_name }}.{{ cluster_domain }}  {{ scan_name }}
      {% else %}
      {{ hostvars[host][h] }}    {{ scan_name }}
      {% endif %}
      {% endif %}
      {% endfor %}
      {% endif %}
      {% endif %}
      {% endfor %}
  when: cluster_type == "RAC"
  tags: etchosts

# cleanup /etc/hosts to solve a listener related issue, ora listener binds to hostname's IP.
- name: Remove all 127.0.0.1 lines from /etc/hosts
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.0\.1'
    state: absent
  tags: etchosts

- name: Add fqdn to /etc/hosts if needed
  lineinfile:
    path: /etc/hosts
    regexp: ".*{{ ansible_fqdn }}$"
    line: "{{ ansible_ssh_host }} {{ ansible_hostname }} {{ ansible_fqdn }}"
    state: present
  when: cluster_type in ("NONE", "DG")
  tags: etchosts,fqdn

- name: Add localhost to /etc/hosts if needed
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.0\.1'
    line: "127.0.0.1 localhost localhost.localdomain"
    state: present
  tags: etchosts

- name: prep host | create swap
  include_tasks: swap.yml
  when:
    - swap_blk_device is defined
    - swap_blk_device | length > 0
