---
- name: tls-setup | Define Oracle 26ai WALLET_ROOT Directory
  set_fact:
    tls_wallet_dir: "{{ oracle_base }}/admin/{{ ora_db_name }}/wallet_root/tls"

- name: tls-setup | Create TLS Wallet Directory
  file:
    path: "{{ tls_wallet_dir }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0700'

- name: tls-setup | Retrieve Node-Specific TLS Secret
  shell: "gcloud --quiet secrets versions access latest --secret='{{ instance_hostname }}-tls-secret'"
  register: tls_secret_raw
  become: true
  become_user: "{{ oracle_user }}"
  changed_when: false
  # no_log: true

- name: tls-setup | Write Parsed TLS Artifacts to Disk
  copy:
    content: "{{ item.content }}"
    dest: "{{ tls_wallet_dir }}/{{ item.dest }}"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0600'
  no_log: true
  become: true
  become_user: "{{ oracle_user }}"
  loop:
    - { dest: 'key.pem', content: "{{ (tls_secret_raw.stdout | from_json).key }}" }
    - { dest: 'cert.pem', content: "{{ (tls_secret_raw.stdout | from_json).cert }}" }

- name: tls-setup | Create PKCS#12 Keystore
  shell: >
    openssl pkcs12 -export -in "{{ tls_wallet_dir }}/cert.pem"
    -inkey "{{ tls_wallet_dir }}/key.pem"
    -out "{{ tls_wallet_dir }}/ewallet.p12"
    -name "oracle-db-server"
    -passout pass:"$WALLET_PWD"
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    WALLET_PWD: "{{ (tls_secret_raw.stdout | from_json).pwd }}"
  no_log: true

- name: tls-setup | Create Oracle Auto-Login Wallet
  shell: >
    orapki wallet create -wallet "{{ tls_wallet_dir }}" -auto_login -pwd "$WALLET_PWD" &&
    orapki wallet import_pkcs12 -wallet "{{ tls_wallet_dir }}"
    -pkcs12file "{{ tls_wallet_dir }}/ewallet.p12"
    -pwd "$WALLET_PWD" -pkcs12pwd "$WALLET_PWD"
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    # Explicit PATH prevents crashes when gather_facts: false disables ansible_env
    PATH: "{{ oracle_home }}/bin:/usr/local/bin:/usr/bin:/bin"
    WALLET_PWD: "{{ (tls_secret_raw.stdout | from_json).pwd }}"
  no_log: true

- name: tls-setup | Secure Wallet Permissions (0600)
  file:
    path: "{{ tls_wallet_dir }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0600'

- name: tls-setup | Configure listener.ora for TCPS
  template:
    src: listener.ora.j2
    dest: "{{ oracle_home }}/network/admin/listener.ora"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0644'
    backup: yes
  register: listener_update

- name: tls-setup | Configure sqlnet.ora for TLS
  template:
    src: sqlnet.ora.j2
    dest: "{{ oracle_home }}/network/admin/sqlnet.ora"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0644'
    backup: yes
  register: sqlnet_update

- name: tls-setup | Explicitly Reload Listener
  shell: "{{ oracle_home }}/bin/lsnrctl reload"
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
  when: listener_update.changed or sqlnet_update.changed
